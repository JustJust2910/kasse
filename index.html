<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kassensystem SV GSA</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg-color: #f3f4f6;
      --card-bg: #ffffff;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --secondary: #10b981;
      --danger: #ef4444;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    body {
      background: var(--bg-color);
      color: var(--text-main);
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: var(--primary);
      font-weight: 800;
      font-size: 2rem;
    }

    /* Layout Grid */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      margin-bottom: 20px;
    }

    h3 {
      margin-bottom: 15px;
      font-size: 1.2rem;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 8px;
      color: var(--text-main);
    }

    /* Produkt-Grid */
    .produktliste {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    .prod-btn {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 15px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      height: 110px;
      transition: all 0.2s ease;
      font-weight: 600;
    }

    .prod-btn:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.1);
    }

    .prod-btn .preis {
      color: var(--primary);
      font-size: 0.9rem;
      margin-top: auto;
    }

    /* Warenkorb */
    #warenkorb {
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 15px;
    }

    #warenkorb li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.95rem;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* Kasse & Zahlen */
    .preis-zeile {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 1.1rem;
    }

    #gesamtpreis {
      font-size: 1.5rem;
      color: var(--primary);
      font-weight: 800;
    }

    input[type="number"] {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      font-size: 1rem;
      margin: 10px 0;
      outline: none;
    }

    input[type="number"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .action-btn {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
      margin-top: 10px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: #e5e7eb;
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    /* Bestellungen */
    .bestell-item {
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin-bottom: 10px;
      background: #f9fafb;
    }

    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 5px;
    }

    .status-offen { background: #fef3c7; color: #d97706; }
    .status-bereit { background: #d1fae5; color: #059669; }

    .status-button {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: #e5e7eb;
    }

    .status-button.ready {
      background: var(--secondary);
      color: white;
    }
  </style>
</head>
<body>

  <h1>Kassensystem SV GSA</h1>

  <div class="container">
    <div>
      <div class="card">
        <h3>Produkte</h3>
        <div class="produktliste">
          <button class="prod-btn" onclick="addItem('Waffel', 1.50)">
            <span>Waffel</span>
            <span class="preis">1,50 €</span>
          </button>
          <button class="prod-btn" onclick="addItem('Puderzucker Waffel', 1.80)">
            <span>Waffel mit Puderzucker</span>
            <span class="preis">1,80 €</span>
          </button>
          <button class="prod-btn" onclick="addItem('Nutella Waffel', 2.00)">
            <span>Waffel mit Nutella</span>
            <span class="preis">2,00 €</span>
          </button>
          <button class="prod-btn" onclick="addItem('Kirsch Waffel', 2.30)">
            <span>Waffel mit Kirschen</span>
            <span class="preis">2,30 €</span>
          </button>
          <button class="prod-btn" onclick="addItem('Kirsch & Sahne Waffel', 2.50)">
            <span>Waffel mit Kirschen & Sahne</span>
            <span class="preis">2,50 €</span>
          </button>
          <button class="prod-btn" onclick="addItem('Kakao', 1.80)">
            <span>Kakao</span>
            <span class="preis">1,80 €</span>
          </button>
          <button class="prod-btn" onclick="addItem('Kakao mit Sahne', 2.00)">
            <span>Kakao mit Sahne</span>
            <span class="preis">2,00 €</span>
          </button>
        </div>
      </div>
    </div>

    <div>
      <div class="card">
        <h3>Warenkorb</h3>
        <ul id="warenkorb">
          </ul>

        <div class="preis-zeile">
          <strong>Gesamtpreis:</strong>
          <span id="gesamtpreis">0,00 €</span>
        </div>

        <input type="number" id="geldEingabe" placeholder="Gegebenes Geld in €" oninput="berechneWechselgeld()" step="0.01">

        <div class="preis-zeile">
          <span>Wechselgeld:</span>
          <strong id="wechselgeld">0,00 €</strong>
        </div>

        <button class="action-btn btn-primary" onclick="bestellungAbschliessen()">Bestellung abschließen</button>
        <button class="action-btn btn-secondary" onclick="resetKasse()">Warenkorb leeren</button>
      </div>

      <div class="card">
        <h3>Offene Bestellungen</h3>
        <div id="bestellListe">
          </div>
      </div>
    </div>
  </div>

  <script>
    let warenkorb = [];
    let gesamtpreis = 0;
    let bestellungen = [];
    let aktuelleNummer = 1;
    const maxNummer = 999;

    function addItem(name, preis) {
      const existingItem = warenkorb.find(item => item.name === name);
      if (existingItem) {
        existingItem.quantity += 1;
      } else {
        warenkorb.push({ name, preis, quantity: 1 });
      }
      
      gesamtpreis += preis;
      updateWarenkorb();
      berechneWechselgeld();
    }

    function removeItem(index) {
      const item = warenkorb[index];
      gesamtpreis -= item.preis;
      
      if (item.quantity > 1) {
        item.quantity -= 1;
      } else {
        warenkorb.splice(index, 1);
      }
      
      updateWarenkorb();
      berechneWechselgeld();
    }

    function updateWarenkorb() {
      const liste = document.getElementById('warenkorb');
      liste.innerHTML = '';
      
      warenkorb.forEach((item, index) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <span>${item.name} <strong>x${item.quantity}</strong></span>
          <span>${(item.preis * item.quantity).toFixed(2)} € 
            <button class="delete-btn" onclick="removeItem(${index})">🗑</button>
          </span>
        `;
        liste.appendChild(li);
      });
      document.getElementById('gesamtpreis').textContent = gesamtpreis.toFixed(2).replace('.', ',') + ' €';
    }

    function berechneWechselgeld() {
      const gegeben = parseFloat(document.getElementById('geldEingabe').value);
      const wechselgeld = gegeben - gesamtpreis;
      
      const anzeige = document.getElementById('wechselgeld');
      if (!isNaN(wechselgeld) && wechselgeld >= 0) {
        anzeige.textContent = wechselgeld.toFixed(2).replace('.', ',') + ' €';
        anzeige.style.color = '#10b981';
      } else {
        anzeige.textContent = '0,00 €';
        anzeige.style.color = '#1f2937';
      }
    }

    function resetKasse() {
      warenkorb = [];
      gesamtpreis = 0;
      updateWarenkorb();
      document.getElementById('geldEingabe').value = '';
      document.getElementById('wechselgeld').textContent = '0,00 €';
    }

    function bestellungAbschliessen() {
      if (warenkorb.length === 0) return;

      const bestellung = {
        nummer: aktuelleNummer,
        artikel: [...warenkorb],
        status: 'offen'
      };

      bestellungen.push(bestellung);
      aktuelleNummer = aktuelleNummer >= maxNummer ? 1 : aktuelleNummer + 1;
      renderBestellungen();
      resetKasse();
    }

    function renderBestellungen() {
      const container = document.getElementById('bestellListe');
      container.innerHTML = '';

      if (bestellungen.length === 0) {
        container.innerHTML = '<p style="color: #6b7280; text-align: center;">Keine offenen Bestellungen</p>';
        return;
      }

      bestellungen.forEach((b, index) => {
        const div = document.createElement('div');
        div.classList.add('bestell-item');
        
        const artikelTexte = b.artikel.map(a => `${a.name} (x${a.quantity})`).join(', ');
        const statusKlasse = b.status === 'offen' ? 'status-offen' : 'status-bereit';
        
        div.innerHTML = `
          <strong>Abholnummer #${b.nummer}</strong>
          <span class="status-badge ${statusKlasse}">${b.status}</span>
          <div style="font-size: 0.9rem; color: #4b5563; margin-top: 4px;">${artikelTexte}</div>
        `;

        const button = document.createElement('button');
        button.textContent = b.status === 'offen' ? 'Bereit zur Abholung' : 'Als abgeholt markieren';
        button.classList.add('status-button');
        if (b.status === 'offen') button.classList.add('ready');

        button.onclick = () => {
          if (b.status === 'offen') {
            b.status = 'bereit';
          } else if (b.status === 'bereit') {
            bestellungen.splice(index, 1);
          }
          renderBestellungen();
        };

        div.appendChild(button);
        container.appendChild(div);
      });
    }

    // Initialisiere die Anzeige
    renderBestellungen();
  </script>
</body>
</html>
